    reason: "Reuters European market-close wrap for Wednesday June 24, 2026 (published 12:33 EDT, modified 12:37 EDT), accessed live via MarketScreener syndication: European shares were muted as investors assessed US-Iran negotiations while defence group Rheinmetall slumped after Germany scrapped a landmark frigate programme. The pan-European STOXX 600 closed 0.1% higher and the page widget showed 635.16, +0.08% (prior 634.63); Germany's DAX ended down 0.6%; the stocks-mentioned table put the EURO STOXX 50 at 6,214.70, -0.25%. Rheinmetall dropped 18.7% (off-hours 949.00 EUR, -18.65%) in its biggest one-day drop on record after Berlin scrapped plans to build six F126 frigates over delays and expected cost overruns and switched to smaller Meko A-200 frigates from Thyssenkrupp's marine unit TKMS, which jumped 16%; the broader aerospace and defence sector lost 0.8% and industrials fell 0.2%. Commodity-linked sectors led decliners with miners -2.5% and energy -2.3% on lower metals and oil prices; real estate rose 3% as Segro jumped 17.4% after Prologis took its 16.6 billion dollar bid public, Segro's biggest intraday jump since March 2009. The tech sector reversed gains to fall 0.3% (Infineon -1.2%, BE Semiconductor -1.3%, ASML -0.5%) ahead of Micron's quarterly earnings. Brent crude hit its lowest since the US-Israeli war on Iran began as supply-disruption concerns eased after a peace agreement; German Ifo business morale rose in June to its best current-situation reading in nearly two years; traders priced another 25 bps ECB hike by year-end per LSEG-compiled data. No archive artifact committed for this cycle."

    reason: "Reuters European market-close wrap for Thursday June 25, 2026 (headline 'European Shares Hit Record Close With Healthcare Stocks Leading Broader Rally'; by Utkarsh Hathi, Johann M Cherian and Purvi Agarwal; published 03:23 EDT and updated through the European close), accessed live via the U.S. News and World Report Reuters syndication. The pan-European STOXX 600 ended 0.8% higher at a record close of 640.21, after touching an intraday record of 642.09, its biggest one-day jump in nearly two weeks. Healthcare was among the biggest boosts, up 1.5%, with Bayer jumping 18.7% to top the STOXX 600 after the U.S. Supreme Court reined in thousands of Roundup cancer lawsuits. A tech rally on strong Micron and Qualcomm forecasts pushed the index to its intraday high but faded into the close, with the technology sector ending up 0.8% after gaining as much as 2.5%; at the close Infineon rose 3.1%, STMicroelectronics 5.1%, ASML 2.6% and Siemens Energy 2.3%. U.S. inflation broke above 4% in May for the first time in three years, keeping a Federal Reserve rate increase on the table, and traders priced Fed and ECB hikes by year-end per LSEG-compiled data. Oil reversed earlier declines to gain after a report that Tehran planned to charge billions in fees to reopen the Strait of Hormuz. Among single stocks, 3i Group jumped 11.4% on portfolio company Action's like-for-like sales growth, EasyJet rose 6.4% after rejecting a fourth Castlelake takeover offer, and Volkswagen added about 1.3% after agreeing to sell its Everllence diesel-engine unit to Bain Capital for about 7.4 billion euros (8.4 billion dollars). Intraday single-stock percentages carry a cash-close versus CFD basis. No archive artifact committed for this cycle."

    reason: "Il Sole 24 Ore (Radiocor) English-edition European-close report for June 25, 2026, 'Stock market: tech stocks buoy Europe; Milan closes up 0.3 per cent, led by ST': European markets closed higher driven by the technology sector (+0.9% for the STOXX 600 tech sector index) following Micron's exceptional earnings (Micron +14% on Wall Street during the session), with Italy's FTSE MIB closing +0.28% led by STMicroelectronics +2.75%. Other Milan gainers were Buzzi +2.17%, Ferrari +1.58%, Enel +2%, A2A +1.5% and Campari +0.73%, while defence shares were at the bottom of the table - Avio -6.62%, Leonardo -3.97% and Fincantieri -2.92% - and Stellantis fell 0.95% after weak European vehicle registrations. Oil reversed an intraday decline to rise, with Brent for August up 1.5% at 74.8 dollars and WTI up 1.7% at 71.5 dollars; spot gold recovered the 4,000 dollar mark (+0.9% to 4,028 dollars); the euro traded at 1.138 dollars (+0.2%); bitcoin was down about 3% near its 2026 lows below 60,000 dollars (59,048). US PCE inflation came in line with expectations. No archive artifact committed for this cycle."

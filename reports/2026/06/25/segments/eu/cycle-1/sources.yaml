    reason: "Reuters global-markets wrap for June 25, 2026 by Alun John and Ankur Banerjee, 'Tech stocks surge as Micron earnings ease AI fears, oil falls further', accessed via The Edge Malaysia syndication (published 08:34, updated 17:30 Malaysia time): stocks surged on Thursday after strong earnings and forecasts from chip giants Micron and Qualcomm reignited the AI rally - Micron said customers had committed 22 billion dollars for its memory chips and Qualcomm anticipated 15 billion dollars in data-centre sales by 2029; Micron rose 18% and Qualcomm 12% in pre-market trading. Japan's Nikkei jumped over 4%, South Korea's Kospi gained 5.5%, and Nasdaq 100 futures rose 2.2%. Europe, with fewer tech names, saw the broad STOXX 600 up 0.44% intraday while its tech subindex gained 2%. Oil extended declines as stranded tankers exited the Strait of Hormuz, with Brent down 1.2% at 72.8 dollars and WTI down 1.1% at 69.36 dollars (Brent had fallen 10% on the week, erasing its war gain); the euro sat at 1.1367 dollars just above a 13-month low, the dollar near a one-year high, and spot gold slid below 4,000 dollars for the first time in 2026 to about 3,995 dollars. The 10-year Treasury yield was up about 1 bp after a 9 bp drop the prior day; Germany's 10-year yield was flat. This source captures the intraday global AI catalyst and the early-session oil decline before the later reversal. No archive artifact committed for this cycle."
